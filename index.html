<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Villaverde - Logística</title>
    <!-- Tailwind CSS para el diseño visual -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons para iconos -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- html2pdf.js para generar PDFs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Reglas OBLIGATORIAS para celulares */
        html, body {
            overscroll-behavior-y: none;
            touch-action: pan-y;
            user-select: none;
            -webkit-user-select: none;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .scroll-container {
            height: calc(100vh - 80px); /* Ajustado para cabecera móvil */
            overflow-y: auto;
            overscroll-behavior-y: none;
            padding-bottom: 40px;
        }

        /* Animaciones Personalizadas */
        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-out;
        }

        .view-enter {
            animation: slideFadeIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes slideFadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Botones con efecto "pop" */
        .btn-pop {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-pop:active {
            transform: scale(0.92);
        }
    </style>
</head>
<body class="text-gray-800 antialiased font-sans flex flex-col h-screen overflow-hidden">

    <!-- ========================================== -->
    <!-- PANTALLA DE BIENVENIDA                     -->
    <!-- ========================================== -->
    <div id="view-welcome" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center text-white z-50 transition-opacity duration-1000" onclick="hideWelcome()">
        <div class="animate-bounce mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" fill="#eab308" viewBox="0 0 256 256">
                <path d="M224,192H32a8,8,0,0,1,0-16h8V120a88,88,0,0,1,176,0v56h8a8,8,0,0,1,0,16Zm-24-16v-56a72,72,0,0,0-144,0v56Zm-72-88a40,40,0,0,0-40,40,8,8,0,0,0,16,0,24,24,0,0,1,24-24,8,8,0,0,0,0-16Z"></path>
            </svg>
        </div>
        <h1 class="text-4xl sm:text-6xl font-black mb-1 text-center tracking-wider text-yellow-500 drop-shadow-lg">VILLAVERDE</h1>
        <h2 class="text-2xl sm:text-4xl font-light text-center text-gray-300 tracking-widest">LOGÍSTICA</h2>
        
        <p class="mt-16 text-lg text-gray-400 animate-pulse bg-slate-800 px-6 py-2 rounded-full">Tocar para entrar</p>
    </div>

    <!-- ========================================== -->
    <!-- CABECERA GLOBAL (Oculta en Menú Principal) -->
    <!-- ========================================== -->
    <div id="app-header" class="hidden bg-slate-800 text-white p-3 shadow-lg flex items-center justify-between shrink-0 h-[80px] z-20 relative">
        <button onclick="showView('view-dashboard')" class="btn-pop flex items-center gap-2 bg-slate-700 px-4 py-3 rounded-xl">
            <i class="ph-bold ph-arrow-left text-2xl"></i>
            <span class="text-xl font-bold hidden sm:inline">Volver</span>
        </button>
        <h2 id="header-title" class="text-2xl sm:text-3xl font-bold mr-2 text-yellow-500 text-right leading-tight">Sección</h2>
    </div>

    <!-- ========================================== -->
    <!-- MENÚ PRINCIPAL (Los 4 Cuadros)             -->
    <!-- ========================================== -->
    <div id="view-dashboard" class="view-section flex-1 bg-gray-100 flex flex-col h-full hidden">
        <div class="bg-slate-800 text-white p-5 shadow-lg flex items-center justify-center shrink-0 z-10 relative">
            <h1 class="text-3xl sm:text-5xl font-black text-yellow-500 tracking-wide drop-shadow-md">MENÚ PRINCIPAL</h1>
        </div>
        
        <!-- Grid ajustado para móvil -->
        <div class="flex-1 grid grid-cols-2 gap-4 sm:gap-6 p-4 sm:p-6 pb-8 items-center max-w-2xl mx-auto w-full">
            <!-- Botón 1: Personal -->
            <button onclick="showView('view-personal')" class="btn-pop h-full bg-blue-600 rounded-[2rem] shadow-xl flex flex-col items-center justify-center p-4">
                <i class="ph-fill ph-users-three text-[65px] sm:text-[90px] text-white mb-2 sm:mb-4 drop-shadow-md"></i>
                <span class="text-xl sm:text-3xl font-black text-white uppercase tracking-wide w-full truncate">Personal</span>
                <span class="text-sm sm:text-lg text-blue-200 mt-1 font-medium">Lista Diaria</span>
            </button>
            
            <!-- Botón 2: Extras -->
            <button onclick="showView('view-extras')" class="btn-pop h-full bg-orange-500 rounded-[2rem] shadow-xl flex flex-col items-center justify-center p-4">
                <i class="ph-fill ph-user-plus text-[65px] sm:text-[90px] text-white mb-2 sm:mb-4 drop-shadow-md"></i>
                <span class="text-xl sm:text-3xl font-black text-white uppercase tracking-wide w-full truncate">Extras</span>
                <span class="text-sm sm:text-lg text-orange-200 mt-1 font-medium">Eventuales</span>
            </button>
            
            <!-- Botón 3: Reportes -->
            <button onclick="showView('view-reportes')" class="btn-pop h-full bg-purple-600 rounded-[2rem] shadow-xl flex flex-col items-center justify-center p-4">
                <i class="ph-fill ph-chart-bar text-[65px] sm:text-[90px] text-white mb-2 sm:mb-4 drop-shadow-md"></i>
                <span class="text-xl sm:text-3xl font-black text-white uppercase tracking-wide w-full truncate">Reportes</span>
                <span class="text-sm sm:text-lg text-purple-200 mt-1 font-medium">Resumen</span>
            </button>
            
            <!-- Botón 4: Gestión de Personal -->
            <button onclick="showView('view-gestion')" class="btn-pop h-full bg-teal-600 rounded-[2rem] shadow-xl flex flex-col items-center justify-center p-4">
                <i class="ph-fill ph-user-gear text-[65px] sm:text-[90px] text-white mb-2 sm:mb-4 drop-shadow-md"></i>
                <span class="text-[17px] sm:text-2xl font-black text-white uppercase leading-tight">Gestión del<br>Personal</span>
            </button>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 1: PERSONAL (Asistencia Diaria)      -->
    <!-- ========================================== -->
    <div id="view-personal" class="view-section hidden flex-1 bg-gray-100 flex flex-col">
        <div class="p-3 sm:p-4 bg-white shadow-md z-10 shrink-0">
            <div class="flex items-center justify-between bg-gray-50 p-2 sm:p-4 rounded-xl border-2 border-gray-200">
                <label class="text-lg sm:text-2xl font-bold text-gray-700 ml-2">Día:</label>
                <input type="date" id="personal-date" class="text-lg sm:text-2xl font-bold bg-white p-2 sm:p-3 rounded-lg w-3/4 border-2 border-blue-300 text-center outline-none" onchange="renderPersonalList()">
            </div>
        </div>
        
        <div id="personal-list" class="scroll-container p-3 sm:p-4 flex flex-col gap-3">
            <!-- Empleados JS -->
        </div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 2: EXTRAS (Asistencia Eventuales)    -->
    <!-- ========================================== -->
    <div id="view-extras" class="view-section hidden flex-1 bg-gray-100 flex flex-col">
        <div class="p-3 sm:p-4 bg-white shadow-md z-10 shrink-0 flex flex-col gap-2 sm:gap-4">
            <h3 class="text-lg sm:text-xl font-bold text-center text-gray-500">Rango de Fechas</h3>
            <div class="flex items-center justify-between bg-gray-50 p-2 sm:p-4 rounded-xl border-2 border-gray-200">
                <label class="text-lg font-bold text-gray-700 ml-2">Del:</label>
                <input type="date" id="extras-start-date" class="text-lg font-bold bg-white p-2 rounded-lg w-3/4 border-2 border-orange-300 outline-none">
            </div>
            <div class="flex items-center justify-between bg-gray-50 p-2 sm:p-4 rounded-xl border-2 border-gray-200">
                <label class="text-lg font-bold text-gray-700 ml-2">Al:</label>
                <input type="date" id="extras-end-date" class="text-lg font-bold bg-white p-2 rounded-lg w-3/4 border-2 border-orange-300 outline-none">
            </div>
            <button onclick="renderExtrasList()" class="btn-pop bg-orange-500 text-white text-xl sm:text-2xl py-3 sm:py-4 rounded-xl font-black shadow-md uppercase mt-1">
                Cargar Días
            </button>
        </div>
        
        <div id="extras-list" class="scroll-container p-3 sm:p-4 flex flex-col gap-4">
            <!-- Eventuales JS -->
        </div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 3: REPORTES                          -->
    <!-- ========================================== -->
    <div id="view-reportes" class="view-section hidden flex-1 bg-gray-100 flex flex-col">
        <div class="p-3 sm:p-4 bg-white shadow-md z-10 shrink-0 flex flex-col gap-3">
            <div class="flex items-center justify-between bg-gray-50 p-2 sm:p-4 rounded-xl border-2 border-gray-200">
                <label class="text-lg sm:text-2xl font-bold text-gray-700 ml-2">Ver:</label>
                <input type="date" id="report-date" class="text-lg sm:text-2xl font-bold bg-white p-2 sm:p-3 rounded-lg w-3/4 border-2 border-purple-300 text-center outline-none" onchange="renderReport()">
            </div>
            <!-- Botón de Descarga PDF -->
            <button id="btn-download-pdf" onclick="downloadPDF()" class="hidden btn-pop w-full bg-red-600 text-white text-lg sm:text-xl py-3 rounded-xl font-black shadow-md flex items-center justify-center gap-2">
                <i class="ph-bold ph-file-pdf text-2xl sm:text-3xl"></i>
                DESCARGAR PDF
            </button>
        </div>
        
        <div id="report-content" class="scroll-container p-4 flex flex-col gap-4">
            <!-- Reporte JS -->
        </div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 4: GESTIÓN DE PERSONAL               -->
    <!-- ========================================== -->
    <div id="view-gestion" class="view-section hidden flex-1 bg-gray-100 flex flex-col">
        <div class="p-3 sm:p-4 bg-white shadow-md z-10 shrink-0">
            <button onclick="openEmployeeModal()" class="btn-pop w-full bg-teal-600 text-white text-xl sm:text-3xl py-4 sm:py-5 rounded-xl font-black shadow-md flex items-center justify-center gap-3">
                <i class="ph-bold ph-plus-circle text-3xl sm:text-4xl"></i>
                NUEVO PERSONAL
            </button>
        </div>
        
        <div id="gestion-list" class="scroll-container p-3 sm:p-4 flex flex-col gap-3">
            <!-- Personal JS -->
        </div>
    </div>


    <!-- ========================================== -->
    <!-- MODAL: AÑADIR / EDITAR EMPLEADO            -->
    <!-- ========================================== -->
    <div id="modal-employee" class="hidden fixed inset-0 bg-slate-900/95 z-[100] flex flex-col items-center justify-end sm:justify-center p-2 sm:p-4 transition-opacity">
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl p-5 sm:p-8 flex flex-col gap-5 sm:gap-6 shadow-2xl overflow-y-auto max-h-[90vh] animate-[slideFadeIn_0.3s_ease-out]">
            <h2 id="modal-title" class="text-3xl sm:text-4xl font-black text-center text-teal-700">Nuevo Personal</h2>
            
            <input type="hidden" id="emp-id">
            
            <!-- Nombres -->
            <div class="flex flex-col gap-1 sm:gap-2">
                <label class="text-lg sm:text-xl font-bold text-gray-700">Nombres</label>
                <input type="text" id="emp-nombre" class="text-xl sm:text-2xl p-3 sm:p-4 border-2 border-gray-300 rounded-xl focus:border-teal-500 outline-none placeholder-gray-400" placeholder="Ej: Juan">
            </div>
            
            <!-- Apellidos -->
            <div class="flex flex-col gap-1 sm:gap-2">
                <label class="text-lg sm:text-xl font-bold text-gray-700">Apellidos</label>
                <input type="text" id="emp-apellido" class="text-xl sm:text-2xl p-3 sm:p-4 border-2 border-gray-300 rounded-xl focus:border-teal-500 outline-none placeholder-gray-400" placeholder="Ej: Perez">
            </div>
            
            <!-- Montacargista (Toggle) -->
            <div class="btn-pop flex items-center justify-between bg-slate-50 p-4 rounded-xl border-2 border-slate-200" onclick="toggleMontacargaModal()">
                <div class="flex items-center gap-3">
                    <i class="ph-fill ph-forklift text-4xl text-yellow-600"></i>
                    <span class="text-lg sm:text-xl font-bold text-gray-700">¿Es Montacargista?</span>
                </div>
                <!-- Toggle UI -->
                <div id="ui-toggle-montacarga" class="w-16 h-8 bg-gray-400 rounded-full relative transition-colors duration-300 shadow-inner">
                    <div id="ui-toggle-knob" class="w-6 h-6 bg-white rounded-full absolute top-1 left-1 transition-transform duration-300 shadow"></div>
                </div>
                <input type="checkbox" id="emp-montacarga" class="hidden">
            </div>
            
            <!-- Tipo de Contrato -->
            <div class="flex flex-col gap-2 mt-1">
                <label class="text-lg sm:text-xl font-bold text-gray-700">Tipo de Contrato</label>
                <div class="grid grid-cols-2 gap-2 sm:gap-4">
                    <button id="btn-planta" onclick="selectContractType('planta')" class="btn-pop py-4 sm:py-6 text-sm sm:text-lg font-bold rounded-xl border-2 border-gray-300 text-gray-500 bg-gray-50 flex flex-col items-center justify-center gap-1">
                        <i class="ph-fill ph-briefcase text-2xl sm:text-3xl"></i> De Planta
                    </button>
                    <button id="btn-eventual" onclick="selectContractType('eventual')" class="btn-pop py-4 sm:py-6 text-sm sm:text-lg font-bold rounded-xl border-2 border-gray-300 text-gray-500 bg-gray-50 flex flex-col items-center justify-center gap-1">
                        <i class="ph-fill ph-user-plus text-2xl sm:text-3xl"></i> Eventual (Extra)
                    </button>
                </div>
                <input type="hidden" id="emp-contrato" value="planta">
            </div>
            
            <!-- Acciones -->
            <div class="flex gap-3 mt-2">
                <button onclick="closeEmployeeModal()" class="btn-pop flex-1 py-4 text-xl font-bold rounded-xl bg-red-100 text-red-600 border-2 border-red-200">
                    Cancelar
                </button>
                <button onclick="saveEmployee()" class="btn-pop flex-1 py-4 text-xl font-bold rounded-xl bg-teal-600 text-white shadow-md">
                    Guardar
                </button>
            </div>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- LOGICA DE LA APLICACIÓN (JavaScript)       -->
    <!-- ========================================== -->
    <script>
        const state = {
            employees: [],
            attendance: {}
        };

        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = '';
        });

        function getTodayString() {
            const today = new Date();
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            return today.toISOString().split('T')[0];
        }

        function formatDateDisplay(dateString) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const date = new Date(dateString + "T12:00:00"); 
            let formatted = date.toLocaleDateString('es-ES', options);
            return formatted.charAt(0).toUpperCase() + formatted.slice(1);
        }

        function hideWelcome() {
            const welcome = document.getElementById('view-welcome');
            welcome.classList.add('fade-out');
            setTimeout(() => {
                welcome.classList.add('hidden');
                showView('view-dashboard');
            }, 800);
        }

        setTimeout(() => {
            if(!document.getElementById('view-welcome').classList.contains('hidden')){
                hideWelcome();
            }
        }, 2500);

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('view-enter'); // Reinicia animación
            });
            
            const targetView = document.getElementById(viewId);
            targetView.classList.remove('hidden');
            
            // Forzar reflow para que la animación CSS se dispare cada vez
            void targetView.offsetWidth; 
            targetView.classList.add('view-enter');
            
            const header = document.getElementById('app-header');
            const headerTitle = document.getElementById('header-title');
            
            if(viewId === 'view-dashboard') {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
                
                if(viewId === 'view-personal') headerTitle.innerText = "Asistencia";
                if(viewId === 'view-extras') headerTitle.innerText = "Extras";
                if(viewId === 'view-reportes') headerTitle.innerText = "Reportes";
                if(viewId === 'view-gestion') headerTitle.innerText = "Gestión";
            }

            if(viewId === 'view-gestion') renderGestionList();
            if(viewId === 'view-personal') {
                document.getElementById('personal-date').value = getTodayString();
                renderPersonalList();
            }
            if(viewId === 'view-extras') {
                const hoy = new Date();
                const inicioSemana = new Date(hoy);
                inicioSemana.setDate(hoy.getDate() - hoy.getDay() + (hoy.getDay() === 0 ? -6 : 1));
                document.getElementById('extras-start-date').value = inicioSemana.toISOString().split('T')[0];
                document.getElementById('extras-end-date').value = getTodayString();
                document.getElementById('extras-list').innerHTML = '<p class="text-center text-lg text-gray-400 mt-10">Toque "Cargar Días"</p>';
            }
            if(viewId === 'view-reportes') {
                document.getElementById('report-date').value = getTodayString();
                renderReport();
            }
        }

        // ==========================================
        // GESTIÓN
        // ==========================================
        function renderGestionList() {
            const container = document.getElementById('gestion-list');
            container.innerHTML = '';

            if (state.employees.length === 0) {
                container.innerHTML = `<div class="text-center p-6 text-gray-400 text-lg sm:text-xl font-bold bg-white rounded-2xl mt-6 shadow-sm border-2 border-dashed border-gray-200">No hay personal aún.</div>`;
                return;
            }

            const sortedEmp = [...state.employees].sort((a,b) => a.nombre.localeCompare(b.nombre));

            sortedEmp.forEach(emp => {
                const isPlanta = emp.contrato === 'planta';
                const tagContrato = isPlanta 
                    ? `<span class="bg-blue-100 text-blue-800 px-2 py-1 rounded-lg text-xs sm:text-sm font-bold flex items-center gap-1 w-max"><i class="ph-fill ph-briefcase"></i> Planta</span>`
                    : `<span class="bg-orange-100 text-orange-800 px-2 py-1 rounded-lg text-xs sm:text-sm font-bold flex items-center gap-1 w-max"><i class="ph-fill ph-user-plus"></i> Extra</span>`;
                
                const tagMontacarga = emp.montacarga 
                    ? `<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded-lg text-xs sm:text-sm font-bold flex items-center gap-1 w-max"><i class="ph-fill ph-forklift"></i> Montacargista</span>`
                    : '';

                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex justify-between items-center gap-3";
                div.innerHTML = `
                    <div class="flex flex-col gap-1 w-full overflow-hidden">
                        <div class="text-xl sm:text-2xl font-black text-gray-800 truncate">${emp.nombre} ${emp.apellido}</div>
                        <div class="flex flex-wrap gap-1">
                            ${tagContrato}
                            ${tagMontacarga}
                        </div>
                    </div>
                    <button onclick="editEmployee('${emp.id}')" class="btn-pop shrink-0 bg-gray-100 text-gray-700 p-3 sm:px-5 sm:py-3 rounded-xl text-lg font-bold flex items-center justify-center gap-1">
                        <i class="ph-bold ph-pencil-simple text-2xl"></i> <span class="hidden sm:inline">Editar</span>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function openEmployeeModal() {
            document.getElementById('modal-title').innerText = "Nuevo Personal";
            document.getElementById('emp-id').value = "";
            document.getElementById('emp-nombre').value = "";
            document.getElementById('emp-apellido').value = "";
            
            document.getElementById('emp-montacarga').checked = false;
            updateMontacargaUI(false);
            selectContractType('planta');
            
            document.getElementById('modal-employee').classList.remove('hidden');
        }

        function closeEmployeeModal() {
            document.getElementById('modal-employee').classList.add('hidden');
        }

        function editEmployee(id) {
            const emp = state.employees.find(e => e.id === id);
            if(!emp) return;

            document.getElementById('modal-title').innerText = "Editar Personal";
            document.getElementById('emp-id').value = emp.id;
            document.getElementById('emp-nombre').value = emp.nombre;
            document.getElementById('emp-apellido').value = emp.apellido;
            
            document.getElementById('emp-montacarga').checked = emp.montacarga;
            updateMontacargaUI(emp.montacarga);
            selectContractType(emp.contrato);

            document.getElementById('modal-employee').classList.remove('hidden');
        }

        function saveEmployee() {
            const idInput = document.getElementById('emp-id').value;
            const nombre = document.getElementById('emp-nombre').value.trim();
            const apellido = document.getElementById('emp-apellido').value.trim();
            const montacarga = document.getElementById('emp-montacarga').checked;
            const contrato = document.getElementById('emp-contrato').value;

            if (!nombre || !apellido) {
                alert("Ingrese nombre y apellido.");
                return;
            }

            if (idInput) {
                const idx = state.employees.findIndex(e => e.id === idInput);
                if (idx > -1) state.employees[idx] = { id: idInput, nombre, apellido, montacarga, contrato };
            } else {
                state.employees.push({ id: "emp_" + Date.now(), nombre, apellido, montacarga, contrato });
            }

            closeEmployeeModal();
            renderGestionList();
        }

        function toggleMontacargaModal() {
            const checkbox = document.getElementById('emp-montacarga');
            checkbox.checked = !checkbox.checked;
            updateMontacargaUI(checkbox.checked);
        }

        function updateMontacargaUI(isChecked) {
            const bg = document.getElementById('ui-toggle-montacarga');
            const knob = document.getElementById('ui-toggle-knob');
            if(isChecked) {
                bg.classList.replace('bg-gray-400', 'bg-yellow-500');
                knob.classList.add('translate-x-8');
            } else {
                bg.classList.replace('bg-yellow-500', 'bg-gray-400');
                knob.classList.remove('translate-x-8');
            }
        }

        function selectContractType(type) {
            document.getElementById('emp-contrato').value = type;
            const btnPlanta = document.getElementById('btn-planta');
            const btnEventual = document.getElementById('btn-eventual');

            if(type === 'planta') {
                btnPlanta.className = "btn-pop py-4 sm:py-6 text-sm sm:text-lg font-bold rounded-xl border-2 border-blue-600 bg-blue-100 text-blue-800 flex flex-col items-center justify-center gap-1 shadow-inner";
                btnEventual.className = "btn-pop py-4 sm:py-6 text-sm sm:text-lg font-bold rounded-xl border-2 border-gray-300 text-gray-500 bg-gray-50 flex flex-col items-center justify-center gap-1";
            } else {
                btnEventual.className = "btn-pop py-4 sm:py-6 text-sm sm:text-lg font-bold rounded-xl border-2 border-orange-500 bg-orange-100 text-orange-800 flex flex-col items-center justify-center gap-1 shadow-inner";
                btnPlanta.className = "btn-pop py-4 sm:py-6 text-sm sm:text-lg font-bold rounded-xl border-2 border-gray-300 text-gray-500 bg-gray-50 flex flex-col items-center justify-center gap-1";
            }
        }

        // ==========================================
        // ASISTENCIA PERSONAL
        // ==========================================
        function initAttendanceDate(date) {
            if (!state.attendance[date]) state.attendance[date] = {};
            state.employees.forEach(emp => {
                if (!state.attendance[date][emp.id]) state.attendance[date][emp.id] = "presente";
            });
        }

        function renderPersonalList() {
            const date = document.getElementById('personal-date').value;
            if(!date) return;

            initAttendanceDate(date);
            const container = document.getElementById('personal-list');
            container.innerHTML = '';

            if (state.employees.length === 0) {
                container.innerHTML = `<p class="text-center text-lg text-gray-400 mt-10">Agregue personal en Gestión.</p>`;
                return;
            }

            const sortedEmp = [...state.employees].sort((a,b) => {
                if (a.contrato !== b.contrato) return a.contrato === 'planta' ? -1 : 1;
                return a.nombre.localeCompare(b.nombre);
            });

            sortedEmp.forEach(emp => {
                const isPresente = state.attendance[date][emp.id] === 'presente';
                
                const btnPresClass = isPresente 
                    ? "btn-pop flex-1 py-3 sm:py-5 text-lg sm:text-xl font-black rounded-xl bg-green-500 text-white shadow-inner border-2 border-green-600" 
                    : "btn-pop flex-1 py-3 sm:py-5 text-lg sm:text-xl font-bold rounded-xl bg-gray-100 text-gray-400 border-2 border-gray-200";
                
                const btnAusClass = !isPresente 
                    ? "btn-pop flex-1 py-3 sm:py-5 text-lg sm:text-xl font-black rounded-xl bg-red-500 text-white shadow-inner border-2 border-red-600" 
                    : "btn-pop flex-1 py-3 sm:py-5 text-lg sm:text-xl font-bold rounded-xl bg-gray-100 text-gray-400 border-2 border-gray-200";

                const tagMontacarga = emp.montacarga ? `<i class="ph-fill ph-forklift text-yellow-500 text-2xl" title="Montacargista"></i>` : '';
                const tipoTexto = emp.contrato === 'planta' ? 'Planta' : 'Extra';
                const tipoColor = emp.contrato === 'planta' ? 'text-blue-500' : 'text-orange-500';

                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex flex-col gap-3";
                div.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col truncate pr-2">
                            <span class="text-xl sm:text-2xl font-black text-gray-800 truncate">${emp.nombre} ${emp.apellido}</span>
                            <span class="text-sm sm:text-base font-bold ${tipoColor}">${tipoTexto}</span>
                        </div>
                        ${tagMontacarga}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setAttendance('${date}', '${emp.id}', 'presente')" class="${btnPresClass}">PRESENTE</button>
                        <button onclick="setAttendance('${date}', '${emp.id}', 'ausente')" class="${btnAusClass}">AUSENTE</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function setAttendance(date, empId, status) {
            state.attendance[date][empId] = status;
            if (!document.getElementById('view-personal').classList.contains('hidden')) {
                renderPersonalList();
            } else if (!document.getElementById('view-extras').classList.contains('hidden')) {
                renderExtrasList();
            }
        }

        // ==========================================
        // EXTRAS
        // ==========================================
        function getDatesInRange(startStr, endStr) {
            const start = new Date(startStr + "T12:00:00");
            const end = new Date(endStr + "T12:00:00");
            const dateArray = [];
            let currentDate = new Date(start);
            while (currentDate <= end) {
                dateArray.push(currentDate.toISOString().split('T')[0]);
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return dateArray;
        }

        function renderExtrasList() {
            const start = document.getElementById('extras-start-date').value;
            const end = document.getElementById('extras-end-date').value;
            const container = document.getElementById('extras-list');
            
            if(!start || !end) return;
            if(new Date(start) > new Date(end)) {
                alert("La fecha de inicio no puede ser mayor a la fecha fin.");
                return;
            }

            container.innerHTML = '';
            const extras = state.employees.filter(e => e.contrato === 'eventual');
            if(extras.length === 0) {
                container.innerHTML = `<p class="text-center text-lg text-gray-400 mt-10">No hay Personal Extra registrado.</p>`;
                return;
            }

            const dates = getDatesInRange(start, end);

            dates.forEach(date => {
                initAttendanceDate(date);

                const divDia = document.createElement('div');
                divDia.className = "bg-white rounded-2xl shadow-sm border-2 border-orange-200 overflow-hidden";
                
                const cabecera = document.createElement('div');
                cabecera.className = "bg-orange-100 p-2 sm:p-3 border-b-2 border-orange-200";
                cabecera.innerHTML = `<h3 class="text-lg sm:text-xl font-black text-orange-900 text-center uppercase">${formatDateDisplay(date)}</h3>`;
                divDia.appendChild(cabecera);

                const listaPersonas = document.createElement('div');
                listaPersonas.className = "p-3 flex flex-col gap-3 bg-orange-50/50";

                extras.forEach(emp => {
                    const isPresente = state.attendance[date][emp.id] === 'presente';
                    
                    const btnPresClass = isPresente 
                        ? "btn-pop flex-1 py-2 text-lg font-black rounded-lg bg-green-500 text-white border-2 border-green-600" 
                        : "btn-pop flex-1 py-2 text-lg font-bold rounded-lg bg-white text-gray-400 border-2 border-gray-200";
                    
                    const btnAusClass = !isPresente 
                        ? "btn-pop flex-1 py-2 text-lg font-black rounded-lg bg-red-500 text-white border-2 border-red-600" 
                        : "btn-pop flex-1 py-2 text-lg font-bold rounded-lg bg-white text-gray-400 border-2 border-gray-200";

                    const item = document.createElement('div');
                    item.className = "flex flex-col gap-2 bg-white p-3 rounded-xl border border-gray-100 shadow-sm";
                    item.innerHTML = `
                        <div class="text-lg sm:text-xl font-bold text-gray-800 truncate">${emp.nombre} ${emp.apellido}</div>
                        <div class="flex gap-2">
                            <button onclick="setAttendance('${date}', '${emp.id}', 'presente')" class="${btnPresClass}">VINO</button>
                            <button onclick="setAttendance('${date}', '${emp.id}', 'ausente')" class="${btnAusClass}">FALTÓ</button>
                        </div>
                    `;
                    listaPersonas.appendChild(item);
                });

                divDia.appendChild(listaPersonas);
                container.appendChild(divDia);
            });
        }

        // ==========================================
        // REPORTES
        // ==========================================
        function renderReport() {
            const date = document.getElementById('report-date').value;
            const container = document.getElementById('report-content');
            const btnPdf = document.getElementById('btn-download-pdf');
            container.innerHTML = '';

            if(!date) {
                if(btnPdf) btnPdf.classList.add('hidden');
                return;
            }

            const attOfDay = state.attendance[date];
            if(!attOfDay || Object.keys(attOfDay).length === 0) {
                container.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow-sm text-center text-lg text-gray-400 border border-gray-200">No hay registros para este día.</div>`;
                if(btnPdf) btnPdf.classList.add('hidden');
                return;
            }

            if(btnPdf) btnPdf.classList.remove('hidden');

            const presentes = [];
            const ausentes = [];

            state.employees.forEach(emp => {
                const status = attOfDay[emp.id];
                if(status === 'presente') presentes.push(emp);
                if(status === 'ausente') ausentes.push(emp);
            });

            container.innerHTML += `
                <div class="bg-purple-800 text-white p-5 rounded-2xl shadow-lg flex flex-col items-center gap-4 animate-[slideFadeIn_0.3s_ease-out]">
                    <h3 class="text-xl sm:text-2xl font-black uppercase text-center">${formatDateDisplay(date)}</h3>
                    <div class="flex gap-4 w-full">
                        <div class="flex-1 bg-green-500/20 border-2 border-green-500 rounded-xl p-3 text-center">
                            <span class="block text-4xl sm:text-5xl font-black text-green-400">${presentes.length}</span>
                            <span class="text-xs sm:text-sm font-bold mt-1 block">PRESENTES</span>
                        </div>
                        <div class="flex-1 bg-red-500/20 border-2 border-red-500 rounded-xl p-3 text-center">
                            <span class="block text-4xl sm:text-5xl font-black text-red-400">${ausentes.length}</span>
                            <span class="text-xs sm:text-sm font-bold mt-1 block">AUSENTES</span>
                        </div>
                    </div>
                </div>
            `;

            if(ausentes.length > 0) {
                let htmlAus = `
                <div class="bg-white border-2 border-red-300 rounded-2xl overflow-hidden shadow-sm animate-[slideFadeIn_0.4s_ease-out]">
                    <div class="bg-red-100 p-3 border-b-2 border-red-200 text-center">
                        <h4 class="text-lg font-black text-red-800">LISTA DE AUSENTES</h4>
                    </div>
                    <div class="p-2 flex flex-col">`;
                
                ausentes.forEach(emp => {
                    const tipo = emp.contrato === 'planta' ? '(Planta)' : '(Extra)';
                    htmlAus += `<div class="text-base sm:text-lg font-bold text-gray-700 py-2 px-2 border-b border-gray-100 flex items-center gap-2 last:border-0 truncate">
                        <i class="ph-fill ph-x-circle text-red-500 text-2xl shrink-0"></i>
                        <span class="truncate">${emp.nombre} ${emp.apellido}</span> <span class="text-xs text-gray-400 shrink-0">${tipo}</span>
                    </div>`;
                });
                
                htmlAus += `</div></div>`;
                container.innerHTML += htmlAus;
            }

            if(presentes.length > 0) {
                let htmlPres = `
                <div class="bg-white border-2 border-green-300 rounded-2xl overflow-hidden shadow-sm animate-[slideFadeIn_0.5s_ease-out]">
                    <div class="bg-green-100 p-3 border-b-2 border-green-200 text-center">
                        <h4 class="text-lg font-black text-green-800">LISTA DE PRESENTES</h4>
                    </div>
                    <div class="p-2 flex flex-col">`;
                
                presentes.forEach(emp => {
                    const tipo = emp.contrato === 'planta' ? '(Planta)' : '(Extra)';
                    htmlPres += `<div class="text-base sm:text-lg font-bold text-gray-700 py-2 px-2 border-b border-gray-100 flex items-center gap-2 last:border-0 truncate">
                        <i class="ph-fill ph-check-circle text-green-500 text-2xl shrink-0"></i>
                        <span class="truncate">${emp.nombre} ${emp.apellido}</span> <span class="text-xs text-gray-400 shrink-0">${tipo}</span>
                    </div>`;
                });
                
                htmlPres += `</div></div>`;
                container.innerHTML += htmlPres;
            }
        }

        // ==========================================
        // DESCARGA PDF
        // ==========================================
        function downloadPDF() {
            const date = document.getElementById('report-date').value;
            const element = document.getElementById('report-content');
            
            // Cambiar visualmente el botón a estado "Cargando"
            const btnPdf = document.getElementById('btn-download-pdf');
            const originalText = btnPdf.innerHTML;
            btnPdf.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-2xl sm:text-3xl"></i> GENERANDO...`;
            btnPdf.disabled = true;

            const opt = {
                margin:       [10, 10, 10, 10], // Márgenes del PDF
                filename:     `Reporte_Logistica_Villaverde_${date}.pdf`, // Nombre del archivo guardado
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true }, // Mayor resolución para los textos
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Damos un milisegundo de respiro para que la UI se actualice con el "Generando..."
            setTimeout(() => {
                html2pdf().set(opt).from(element).save().then(() => {
                    // Restaurar el botón original
                    btnPdf.innerHTML = originalText;
                    btnPdf.disabled = false;
                }).catch(err => {
                    console.error("Error al generar PDF:", err);
                    alert("Ocurrió un error al intentar generar el PDF.");
                    btnPdf.innerHTML = originalText;
                    btnPdf.disabled = false;
                });
            }, 100);
        }
    </script>
</body>
