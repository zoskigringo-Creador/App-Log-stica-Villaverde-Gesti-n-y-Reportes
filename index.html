<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Meta tags para que se comporte como app nativa -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Villaverde - Logística</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Reglas OBLIGATORIAS para celulares */
        html, body {
            overscroll-behavior-y: none;
            touch-action: pan-y;
            user-select: none;
            -webkit-user-select: none;
            background-color: #f8fafc; /* Color de fondo más suave */
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        ::-webkit-scrollbar {
            display: none;
        }

        .scroll-container {
            height: calc(100vh - 80px);
            overflow-y: auto;
            overscroll-behavior-y: none;
            padding-bottom: 80px; /* Más espacio abajo para no tapar contenido */
        }

        /* Animaciones mucho más fluidas y suaves */
        .fade-out {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-out;
        }

        .view-enter {
            animation: smoothFadeIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes smoothFadeIn {
            from {
                opacity: 0;
                transform: translateY(15px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Botones con efecto táctil más sutil y profesional */
        .btn-pop {
            transition: transform 0.15s ease-out, background-color 0.2s;
        }
        .btn-pop:active {
            transform: scale(0.95);
        }

        /* Modal smooth enter */
        .modal-enter {
            animation: modalSlideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes modalSlideUp {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased flex flex-col h-screen overflow-hidden">

    <!-- ========================================== -->
    <!-- PANTALLA DE BIENVENIDA                     -->
    <!-- ========================================== -->
    <div id="view-welcome" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center text-white z-50 transition-opacity duration-1000" onclick="hideWelcome()">
        <div class="animate-bounce mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="140" height="140" fill="#eab308" viewBox="0 0 256 256">
                <path d="M224,192H32a8,8,0,0,1,0-16h8V120a88,88,0,0,1,176,0v56h8a8,8,0,0,1,0,16Zm-24-16v-56a72,72,0,0,0-144,0v56Zm-72-88a40,40,0,0,0-40,40,8,8,0,0,0,16,0,24,24,0,0,1,24-24,8,8,0,0,0,0-16Z"></path>
            </svg>
        </div>
        <h1 class="text-4xl sm:text-6xl font-black mb-1 text-center tracking-widest text-yellow-500">VILLAVERDE</h1>
        <h2 class="text-xl sm:text-3xl font-light text-center text-slate-400 tracking-[0.3em]">LOGÍSTICA</h2>
        
        <p class="mt-20 text-sm text-slate-500 uppercase tracking-widest animate-pulse">Tocar para iniciar</p>
    </div>

    <!-- ========================================== -->
    <!-- CABECERA GLOBAL (Oculta en Menú Principal) -->
    <!-- ========================================== -->
    <div id="app-header" class="hidden bg-slate-900 text-white p-3 shadow-md flex items-center justify-between shrink-0 h-[80px] z-20 relative">
        <button onclick="showView('view-dashboard')" class="btn-pop flex items-center gap-2 bg-slate-800 px-4 py-3 rounded-xl border border-slate-700 text-slate-200">
            <i class="ph-bold ph-caret-left text-2xl"></i>
            <span class="text-lg font-bold hidden sm:inline">Atrás</span>
        </button>
        <h2 id="header-title" class="text-2xl font-black mr-2 text-yellow-500 uppercase tracking-wide">Sección</h2>
    </div>

    <!-- ========================================== -->
    <!-- MENÚ PRINCIPAL (Los 4 Cuadros)             -->
    <!-- ========================================== -->
    <div id="view-dashboard" class="view-section flex-1 bg-slate-50 flex flex-col h-full hidden">
        <div class="bg-slate-900 text-white p-6 shadow-md flex items-center justify-between shrink-0 z-10 relative">
            <div>
                <h1 class="text-2xl sm:text-4xl font-black text-yellow-500 tracking-wider">MENÚ PRINCIPAL</h1>
                <p class="text-slate-400 text-sm">Logística Integral</p>
            </div>
            <!-- Botón de Pantalla Completa (Full Screen) -->
            <button onclick="toggleFullScreen()" class="btn-pop bg-slate-800 p-3 rounded-full border border-slate-700 text-yellow-500 shadow-inner">
                <i id="fs-icon" class="ph-bold ph-corners-out text-2xl"></i>
            </button>
        </div>
        
        <div class="flex-1 grid grid-cols-2 gap-4 p-4 items-center max-w-2xl mx-auto w-full">
            <!-- Botón 1: Personal -->
            <button onclick="showView('view-personal')" class="btn-pop h-full bg-blue-600 rounded-[2rem] shadow-lg flex flex-col items-center justify-center p-5 relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent"></div>
                <i class="ph-fill ph-users-three text-[70px] text-white mb-3"></i>
                <span class="text-xl font-black text-white uppercase tracking-wide">Personal</span>
                <span class="text-sm text-blue-200 font-medium">Asistencia</span>
            </button>
            
            <!-- Botón 2: Extras -->
            <button onclick="showView('view-extras')" class="btn-pop h-full bg-orange-500 rounded-[2rem] shadow-lg flex flex-col items-center justify-center p-5 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent"></div>
                <i class="ph-fill ph-user-plus text-[70px] text-white mb-3"></i>
                <span class="text-xl font-black text-white uppercase tracking-wide">Extras</span>
                <span class="text-sm text-orange-200 font-medium">Eventuales</span>
            </button>
            
            <!-- Botón 3: Reportes -->
            <button onclick="showView('view-reportes')" class="btn-pop h-full bg-purple-600 rounded-[2rem] shadow-lg flex flex-col items-center justify-center p-5 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent"></div>
                <i class="ph-fill ph-file-text text-[70px] text-white mb-3"></i>
                <span class="text-xl font-black text-white uppercase tracking-wide">Reportes</span>
                <span class="text-sm text-purple-200 font-medium">Imprimir / PDF</span>
            </button>
            
            <!-- Botón 4: Gestión de Personal -->
            <button onclick="showView('view-gestion')" class="btn-pop h-full bg-teal-600 rounded-[2rem] shadow-lg flex flex-col items-center justify-center p-5 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent"></div>
                <i class="ph-fill ph-address-book text-[70px] text-white mb-3"></i>
                <span class="text-[16px] font-black text-white uppercase leading-tight text-center">Gestión de<br>Personal</span>
            </button>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 1: PERSONAL (Asistencia Diaria)      -->
    <!-- ========================================== -->
    <div id="view-personal" class="view-section hidden flex-1 bg-slate-50 flex flex-col">
        <div class="p-3 bg-white shadow-sm z-10 shrink-0 border-b border-slate-200">
            <div class="flex items-center justify-between bg-slate-100 p-2 rounded-xl border border-slate-200">
                <label class="text-lg font-bold text-slate-600 ml-3">Día:</label>
                <input type="date" id="personal-date" class="text-xl font-black bg-white p-2 rounded-lg w-3/4 border border-blue-200 text-center text-blue-800 outline-none" onchange="renderPersonalList()">
            </div>
        </div>
        <div id="personal-list" class="scroll-container p-3 flex flex-col gap-3"></div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 2: EXTRAS (Asistencia Eventuales)    -->
    <!-- ========================================== -->
    <div id="view-extras" class="view-section hidden flex-1 bg-slate-50 flex flex-col">
        <div class="p-3 bg-white shadow-sm z-10 shrink-0 border-b border-slate-200 flex flex-col gap-2">
            <div class="flex items-center justify-between bg-slate-100 p-2 rounded-xl border border-slate-200">
                <label class="text-base font-bold text-slate-600 ml-2">Del:</label>
                <input type="date" id="extras-start-date" class="text-lg font-black bg-white p-2 rounded-lg w-3/4 border border-orange-200 text-orange-800 outline-none">
            </div>
            <div class="flex items-center justify-between bg-slate-100 p-2 rounded-xl border border-slate-200">
                <label class="text-base font-bold text-slate-600 ml-2">Al:</label>
                <input type="date" id="extras-end-date" class="text-lg font-black bg-white p-2 rounded-lg w-3/4 border border-orange-200 text-orange-800 outline-none">
            </div>
            <button onclick="renderExtrasList()" class="btn-pop bg-orange-500 text-white text-xl py-3 rounded-xl font-black shadow-md uppercase mt-1">
                Cargar Fechas
            </button>
        </div>
        <div id="extras-list" class="scroll-container p-3 flex flex-col gap-4"></div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 3: REPORTES                          -->
    <!-- ========================================== -->
    <div id="view-reportes" class="view-section hidden flex-1 bg-slate-50 flex flex-col">
        <div class="p-3 bg-white shadow-sm z-10 shrink-0 border-b border-slate-200 flex flex-col gap-3">
            <div class="flex items-center justify-between bg-slate-100 p-2 rounded-xl border border-slate-200">
                <label class="text-lg font-bold text-slate-600 ml-2">Día a exportar:</label>
                <input type="date" id="report-date" class="text-xl font-black bg-white p-2 rounded-lg w-[60%] border border-purple-300 text-center text-purple-800 outline-none" onchange="renderReport()">
            </div>
            <button id="btn-download-pdf" onclick="generateProfessionalPDF()" class="hidden btn-pop w-full bg-slate-800 text-white text-lg py-3 rounded-xl font-black shadow flex items-center justify-center gap-2 border border-slate-900">
                <i class="ph-bold ph-printer text-2xl"></i>
                GENERAR PDF PROFESIONAL
            </button>
        </div>
        
        <!-- Contenedor Visual (UI Amigable) -->
        <div id="report-content" class="scroll-container p-4 flex flex-col gap-4">
            <!-- Reporte Visual generado por JS -->
        </div>
    </div>


    <!-- ========================================== -->
    <!-- VISTA 4: GESTIÓN DE PERSONAL               -->
    <!-- ========================================== -->
    <div id="view-gestion" class="view-section hidden flex-1 bg-slate-50 flex flex-col">
        <div class="p-3 bg-white shadow-sm z-10 shrink-0 border-b border-slate-200">
            <button onclick="openEmployeeModal()" class="btn-pop w-full bg-teal-600 text-white text-xl py-4 rounded-xl font-black shadow-md flex items-center justify-center gap-3">
                <i class="ph-bold ph-user-circle-plus text-3xl"></i>
                AGREGAR PERSONAL
            </button>
        </div>
        <div id="gestion-list" class="scroll-container p-3 flex flex-col gap-3"></div>
    </div>


    <!-- ========================================== -->
    <!-- MODAL: AÑADIR / EDITAR EMPLEADO            -->
    <!-- ========================================== -->
    <div id="modal-employee" class="hidden fixed inset-0 bg-slate-900/80 z-[100] flex flex-col items-center justify-end sm:justify-center transition-opacity backdrop-blur-sm p-2">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-3xl p-6 flex flex-col gap-5 shadow-2xl overflow-y-auto max-h-[90vh] modal-enter">
            <h2 id="modal-title" class="text-2xl sm:text-3xl font-black text-center text-slate-800 uppercase">Ficha Personal</h2>
            
            <input type="hidden" id="emp-id">
            
            <div class="flex flex-col gap-1">
                <label class="text-sm font-bold text-slate-500 uppercase tracking-wide">Nombres</label>
                <input type="text" id="emp-nombre" class="text-xl p-3 bg-slate-50 border border-slate-300 rounded-xl focus:border-teal-500 focus:bg-white outline-none transition-colors" placeholder="Ej: Juan">
            </div>
            
            <div class="flex flex-col gap-1">
                <label class="text-sm font-bold text-slate-500 uppercase tracking-wide">Apellidos</label>
                <input type="text" id="emp-apellido" class="text-xl p-3 bg-slate-50 border border-slate-300 rounded-xl focus:border-teal-500 focus:bg-white outline-none transition-colors" placeholder="Ej: Perez">
            </div>
            
            <div class="btn-pop flex items-center justify-between bg-slate-100 p-4 rounded-xl border border-slate-200" onclick="toggleMontacargaModal()">
                <div class="flex items-center gap-3">
                    <div class="bg-yellow-100 p-2 rounded-lg"><i class="ph-fill ph-forklift text-2xl text-yellow-600"></i></div>
                    <span class="text-base font-bold text-slate-700">Montacargista</span>
                </div>
                <div id="ui-toggle-montacarga" class="w-14 h-7 bg-slate-300 rounded-full relative transition-colors duration-300 shadow-inner">
                    <div id="ui-toggle-knob" class="w-5 h-5 bg-white rounded-full absolute top-1 left-1 transition-transform duration-300 shadow"></div>
                </div>
                <input type="checkbox" id="emp-montacarga" class="hidden">
            </div>
            
            <div class="flex flex-col gap-2">
                <label class="text-sm font-bold text-slate-500 uppercase tracking-wide">Contrato</label>
                <div class="grid grid-cols-2 gap-3">
                    <button id="btn-planta" onclick="selectContractType('planta')" class="btn-pop py-4 text-base font-bold rounded-xl border-2 flex flex-col items-center justify-center gap-1 transition-colors">
                        <i class="ph-fill ph-briefcase text-2xl"></i> Planta
                    </button>
                    <button id="btn-eventual" onclick="selectContractType('eventual')" class="btn-pop py-4 text-base font-bold rounded-xl border-2 flex flex-col items-center justify-center gap-1 transition-colors">
                        <i class="ph-fill ph-user-plus text-2xl"></i> Extra
                    </button>
                </div>
                <input type="hidden" id="emp-contrato" value="planta">
            </div>
            
            <div class="flex gap-3 mt-4">
                <button onclick="closeEmployeeModal()" class="btn-pop flex-1 py-4 text-lg font-bold rounded-xl bg-slate-100 text-slate-600 border border-slate-300">
                    Cancelar
                </button>
                <button onclick="saveEmployee()" class="btn-pop flex-1 py-4 text-lg font-bold rounded-xl bg-teal-600 text-white shadow-md">
                    Guardar
                </button>
            </div>
        </div>
    </div>


    <!-- ========================================== -->
    <!-- LOGICA DE LA APLICACIÓN (JavaScript)       -->
    <!-- ========================================== -->
    <script>
        const state = {
            employees: [],
            attendance: {}
        };

        window.addEventListener('beforeunload', function (e) {
            e.preventDefault();
            e.returnValue = '';
        });

        // Toggle FullScreen
        function toggleFullScreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;
            
            const icon = document.getElementById('fs-icon');

            if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl).catch(err => console.log(err));
                icon.classList.replace('ph-corners-out', 'ph-corners-in');
            } else {
                cancelFullScreen.call(doc);
                icon.classList.replace('ph-corners-in', 'ph-corners-out');
            }
        }

        function getTodayString() {
            const today = new Date();
            today.setMinutes(today.getMinutes() - today.getTimezoneOffset());
            return today.toISOString().split('T')[0];
        }

        function formatDateDisplay(dateString) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const date = new Date(dateString + "T12:00:00"); 
            let formatted = date.toLocaleDateString('es-ES', options);
            return formatted.charAt(0).toUpperCase() + formatted.slice(1);
        }

        function hideWelcome() {
            const welcome = document.getElementById('view-welcome');
            welcome.classList.add('fade-out');
            setTimeout(() => {
                welcome.classList.add('hidden');
                showView('view-dashboard');
            }, 600);
        }

        setTimeout(() => {
            if(!document.getElementById('view-welcome').classList.contains('hidden')) hideWelcome();
        }, 2000);

        function showView(viewId) {
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('view-enter');
            });
            
            const targetView = document.getElementById(viewId);
            targetView.classList.remove('hidden');
            
            void targetView.offsetWidth; 
            targetView.classList.add('view-enter');
            
            const header = document.getElementById('app-header');
            const headerTitle = document.getElementById('header-title');
            
            if(viewId === 'view-dashboard') {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
                if(viewId === 'view-personal') headerTitle.innerText = "Asistencia";
                if(viewId === 'view-extras') headerTitle.innerText = "Extras";
                if(viewId === 'view-reportes') headerTitle.innerText = "Reportes";
                if(viewId === 'view-gestion') headerTitle.innerText = "Gestión";
            }

            if(viewId === 'view-gestion') renderGestionList();
            if(viewId === 'view-personal') {
                document.getElementById('personal-date').value = getTodayString();
                renderPersonalList();
            }
            if(viewId === 'view-extras') {
                const hoy = new Date();
                const inicioSemana = new Date(hoy);
                inicioSemana.setDate(hoy.getDate() - hoy.getDay() + (hoy.getDay() === 0 ? -6 : 1));
                document.getElementById('extras-start-date').value = inicioSemana.toISOString().split('T')[0];
                document.getElementById('extras-end-date').value = getTodayString();
                document.getElementById('extras-list').innerHTML = '<div class="flex flex-col items-center justify-center mt-10 text-slate-400 gap-2"><i class="ph-fill ph-calendar-blank text-5xl"></i><p>Seleccione el rango de fechas</p></div>';
            }
            if(viewId === 'view-reportes') {
                document.getElementById('report-date').value = getTodayString();
                renderReport();
            }
        }

        // ==========================================
        // GESTIÓN
        // ==========================================
        function renderGestionList() {
            const container = document.getElementById('gestion-list');
            container.innerHTML = '';

            if (state.employees.length === 0) {
                container.innerHTML = `<div class="text-center p-8 text-slate-400 font-bold bg-white rounded-2xl shadow-sm border border-slate-200 mt-4 flex flex-col items-center gap-2"><i class="ph-fill ph-users text-4xl"></i> No hay personal registrado.</div>`;
                return;
            }

            const sortedEmp = [...state.employees].sort((a,b) => a.nombre.localeCompare(b.nombre));

            sortedEmp.forEach(emp => {
                const isPlanta = emp.contrato === 'planta';
                const tagContrato = isPlanta 
                    ? `<span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-bold border border-blue-200">Planta</span>`
                    : `<span class="bg-orange-50 text-orange-700 px-2 py-1 rounded text-xs font-bold border border-orange-200">Extra</span>`;
                
                const tagMontacarga = emp.montacarga 
                    ? `<i class="ph-fill ph-forklift text-yellow-500 text-xl" title="Montacargista"></i>` : '';

                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center gap-3";
                div.innerHTML = `
                    <div class="flex flex-col w-full overflow-hidden">
                        <div class="text-lg font-black text-slate-800 truncate leading-tight">${emp.nombre} ${emp.apellido}</div>
                        <div class="flex items-center gap-2 mt-1">
                            ${tagContrato} ${tagMontacarga}
                        </div>
                    </div>
                    <button onclick="editEmployee('${emp.id}')" class="btn-pop shrink-0 bg-slate-100 text-slate-600 p-3 rounded-xl flex items-center justify-center border border-slate-200">
                        <i class="ph-bold ph-pencil-simple text-xl"></i>
                    </button>
                `;
                container.appendChild(div);
            });
        }

        function openEmployeeModal() {
            document.getElementById('modal-title').innerText = "Ficha de Personal";
            document.getElementById('emp-id').value = "";
            document.getElementById('emp-nombre').value = "";
            document.getElementById('emp-apellido').value = "";
            document.getElementById('emp-montacarga').checked = false;
            updateMontacargaUI(false);
            selectContractType('planta');
            
            const modal = document.getElementById('modal-employee');
            modal.classList.remove('hidden');
        }

        function closeEmployeeModal() {
            document.getElementById('modal-employee').classList.add('hidden');
        }

        function editEmployee(id) {
            const emp = state.employees.find(e => e.id === id);
            if(!emp) return;

            document.getElementById('modal-title').innerText = "Editar Personal";
            document.getElementById('emp-id').value = emp.id;
            document.getElementById('emp-nombre').value = emp.nombre;
            document.getElementById('emp-apellido').value = emp.apellido;
            document.getElementById('emp-montacarga').checked = emp.montacarga;
            updateMontacargaUI(emp.montacarga);
            selectContractType(emp.contrato);

            document.getElementById('modal-employee').classList.remove('hidden');
        }

        function saveEmployee() {
            const idInput = document.getElementById('emp-id').value;
            const nombre = document.getElementById('emp-nombre').value.trim();
            const apellido = document.getElementById('emp-apellido').value.trim();
            const montacarga = document.getElementById('emp-montacarga').checked;
            const contrato = document.getElementById('emp-contrato').value;

            if (!nombre || !apellido) {
                alert("Ingrese nombre y apellido.");
                return;
            }

            if (idInput) {
                const idx = state.employees.findIndex(e => e.id === idInput);
                if (idx > -1) state.employees[idx] = { id: idInput, nombre, apellido, montacarga, contrato };
            } else {
                state.employees.push({ id: "emp_" + Date.now(), nombre, apellido, montacarga, contrato });
            }

            closeEmployeeModal();
            renderGestionList();
        }

        function toggleMontacargaModal() {
            const checkbox = document.getElementById('emp-montacarga');
            checkbox.checked = !checkbox.checked;
            updateMontacargaUI(checkbox.checked);
        }

        function updateMontacargaUI(isChecked) {
            const bg = document.getElementById('ui-toggle-montacarga');
            const knob = document.getElementById('ui-toggle-knob');
            if(isChecked) {
                bg.classList.replace('bg-slate-300', 'bg-yellow-400');
                knob.classList.add('translate-x-7');
            } else {
                bg.classList.replace('bg-yellow-400', 'bg-slate-300');
                knob.classList.remove('translate-x-7');
            }
        }

        function selectContractType(type) {
            document.getElementById('emp-contrato').value = type;
            const btnPlanta = document.getElementById('btn-planta');
            const btnEventual = document.getElementById('btn-eventual');

            if(type === 'planta') {
                btnPlanta.className = "btn-pop py-3 text-base font-bold rounded-xl border-2 border-blue-500 bg-blue-50 text-blue-700 flex flex-col items-center justify-center gap-1 shadow-sm";
                btnEventual.className = "btn-pop py-3 text-base font-bold rounded-xl border-2 border-slate-200 bg-white text-slate-500 flex flex-col items-center justify-center gap-1";
            } else {
                btnEventual.className = "btn-pop py-3 text-base font-bold rounded-xl border-2 border-orange-500 bg-orange-50 text-orange-700 flex flex-col items-center justify-center gap-1 shadow-sm";
                btnPlanta.className = "btn-pop py-3 text-base font-bold rounded-xl border-2 border-slate-200 bg-white text-slate-500 flex flex-col items-center justify-center gap-1";
            }
        }

        // ==========================================
        // ASISTENCIA PERSONAL
        // ==========================================
        function initAttendanceDate(date) {
            if (!state.attendance[date]) state.attendance[date] = {};
            state.employees.forEach(emp => {
                if (!state.attendance[date][emp.id]) state.attendance[date][emp.id] = "presente";
            });
        }

        function renderPersonalList() {
            const date = document.getElementById('personal-date').value;
            if(!date) return;

            initAttendanceDate(date);
            const container = document.getElementById('personal-list');
            container.innerHTML = '';

            const dePlanta = state.employees.filter(e => e.contrato === 'planta');
            if (dePlanta.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 mt-6 bg-white p-4 rounded-xl border border-slate-200">No hay personal de Planta registrado.</p>`;
                return;
            }

            dePlanta.sort((a,b) => a.nombre.localeCompare(b.nombre)).forEach(emp => {
                const isPresente = state.attendance[date][emp.id] === 'presente';
                
                const btnPresClass = isPresente 
                    ? "btn-pop flex-1 py-3 text-sm sm:text-base font-black rounded-lg bg-green-500 text-white shadow border border-green-600" 
                    : "btn-pop flex-1 py-3 text-sm sm:text-base font-bold rounded-lg bg-slate-100 text-slate-400 border border-slate-200";
                
                const btnAusClass = !isPresente 
                    ? "btn-pop flex-1 py-3 text-sm sm:text-base font-black rounded-lg bg-red-500 text-white shadow border border-red-600" 
                    : "btn-pop flex-1 py-3 text-sm sm:text-base font-bold rounded-lg bg-slate-100 text-slate-400 border border-slate-200";

                const tagMontacarga = emp.montacarga ? `<i class="ph-fill ph-forklift text-yellow-500 text-xl" title="Montacargista"></i>` : '';

                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-3";
                div.innerHTML = `
                    <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                        <div class="text-lg font-black text-slate-800 truncate">${emp.nombre} ${emp.apellido}</div>
                        ${tagMontacarga}
                    </div>
                    <div class="flex gap-2">
                        <button onclick="setAttendance('${date}', '${emp.id}', 'presente')" class="${btnPresClass}">PRESENTE</button>
                        <button onclick="setAttendance('${date}', '${emp.id}', 'ausente')" class="${btnAusClass}">AUSENTE</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function setAttendance(date, empId, status) {
            state.attendance[date][empId] = status;
            if (!document.getElementById('view-personal').classList.contains('hidden')) {
                renderPersonalList();
            } else if (!document.getElementById('view-extras').classList.contains('hidden')) {
                renderExtrasList();
            } else if (!document.getElementById('view-reportes').classList.contains('hidden')) {
                renderReport();
            }
        }

        // ==========================================
        // EXTRAS
        // ==========================================
        function getDatesInRange(startStr, endStr) {
            const start = new Date(startStr + "T12:00:00");
            const end = new Date(endStr + "T12:00:00");
            const dateArray = [];
            let currentDate = new Date(start);
            while (currentDate <= end) {
                dateArray.push(currentDate.toISOString().split('T')[0]);
                currentDate.setDate(currentDate.getDate() + 1);
            }
            return dateArray;
        }

        function renderExtrasList() {
            const start = document.getElementById('extras-start-date').value;
            const end = document.getElementById('extras-end-date').value;
            const container = document.getElementById('extras-list');
            
            if(!start || !end) return;
            if(new Date(start) > new Date(end)) {
                alert("La fecha de inicio no puede ser mayor a la fecha fin.");
                return;
            }

            container.innerHTML = '';
            const extras = state.employees.filter(e => e.contrato === 'eventual');
            if(extras.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-400 mt-6 bg-white p-4 rounded-xl border border-slate-200">No hay Personal Extra registrado.</p>`;
                return;
            }

            const dates = getDatesInRange(start, end);

            dates.forEach(date => {
                initAttendanceDate(date);

                const divDia = document.createElement('div');
                divDia.className = "bg-white rounded-2xl shadow-sm border border-orange-200 overflow-hidden";
                
                const cabecera = document.createElement('div');
                cabecera.className = "bg-orange-50 p-2 border-b border-orange-100";
                cabecera.innerHTML = `<h3 class="text-base font-black text-orange-800 text-center uppercase">${formatDateDisplay(date)}</h3>`;
                divDia.appendChild(cabecera);

                const listaPersonas = document.createElement('div');
                listaPersonas.className = "p-2 flex flex-col gap-2";

                extras.forEach(emp => {
                    const isPresente = state.attendance[date][emp.id] === 'presente';
                    
                    const btnPresClass = isPresente 
                        ? "btn-pop flex-1 py-2 text-sm font-black rounded-lg bg-green-500 text-white" 
                        : "btn-pop flex-1 py-2 text-sm font-bold rounded-lg bg-slate-100 text-slate-400";
                    
                    const btnAusClass = !isPresente 
                        ? "btn-pop flex-1 py-2 text-sm font-black rounded-lg bg-red-500 text-white" 
                        : "btn-pop flex-1 py-2 text-sm font-bold rounded-lg bg-slate-100 text-slate-400";

                    const item = document.createElement('div');
                    item.className = "flex flex-col gap-2 bg-white p-2 rounded-xl border border-slate-100 shadow-sm";
                    item.innerHTML = `
                        <div class="text-base font-bold text-slate-800 truncate px-1">${emp.nombre} ${emp.apellido}</div>
                        <div class="flex gap-2">
                            <button onclick="setAttendance('${date}', '${emp.id}', 'presente')" class="${btnPresClass}">VINO</button>
                            <button onclick="setAttendance('${date}', '${emp.id}', 'ausente')" class="${btnAusClass}">FALTÓ</button>
                        </div>
                    `;
                    listaPersonas.appendChild(item);
                });

                divDia.appendChild(listaPersonas);
                container.appendChild(divDia);
            });
        }

        // ==========================================
        // REPORTES (Visuales en App, separados por tipo)
        // ==========================================
        function renderReport() {
            const date = document.getElementById('report-date').value;
            const container = document.getElementById('report-content');
            const btnPdf = document.getElementById('btn-download-pdf');
            container.innerHTML = '';

            if(!date) {
                if(btnPdf) btnPdf.classList.add('hidden');
                return;
            }

            const attOfDay = state.attendance[date];
            if(!attOfDay || Object.keys(attOfDay).length === 0) {
                container.innerHTML = `<div class="bg-white p-6 rounded-2xl shadow-sm text-center text-slate-500 border border-slate-200"><i class="ph-fill ph-warning-circle text-4xl mb-2 text-slate-300"></i><br>Sin registros en esta fecha.</div>`;
                if(btnPdf) btnPdf.classList.add('hidden');
                return;
            }

            if(btnPdf) btnPdf.classList.remove('hidden');

            const pPlanta = [], aPlanta = [], pExtra = [], aExtra = [];

            state.employees.forEach(emp => {
                const isPlanta = emp.contrato === 'planta';
                const status = attOfDay[emp.id];
                if(status === 'presente') isPlanta ? pPlanta.push(emp) : pExtra.push(emp);
                if(status === 'ausente') isPlanta ? aPlanta.push(emp) : aExtra.push(emp);
            });

            // Tarjeta de Resumen Global
            container.innerHTML += `
                <div class="bg-slate-800 text-white p-5 rounded-3xl shadow-lg flex flex-col gap-3">
                    <h3 class="text-lg font-bold text-center text-slate-300 uppercase">${formatDateDisplay(date)}</h3>
                    <div class="flex gap-3">
                        <div class="flex-1 bg-slate-700/50 rounded-2xl p-3 text-center border border-slate-600">
                            <span class="block text-sm font-bold text-slate-400 uppercase">Planta</span>
                            <div class="flex justify-around mt-2">
                                <div><span class="text-xl font-black text-green-400">${pPlanta.length}</span><span class="block text-[10px] text-slate-400">Pres.</span></div>
                                <div><span class="text-xl font-black text-red-400">${aPlanta.length}</span><span class="block text-[10px] text-slate-400">Aus.</span></div>
                            </div>
                        </div>
                        <div class="flex-1 bg-slate-700/50 rounded-2xl p-3 text-center border border-slate-600">
                            <span class="block text-sm font-bold text-slate-400 uppercase">Extras</span>
                            <div class="flex justify-around mt-2">
                                <div><span class="text-xl font-black text-green-400">${pExtra.length}</span><span class="block text-[10px] text-slate-400">Pres.</span></div>
                                <div><span class="text-xl font-black text-red-400">${aExtra.length}</span><span class="block text-[10px] text-slate-400">Aus.</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // UI de Planta
            if (pPlanta.length > 0 || aPlanta.length > 0) {
                container.innerHTML += buildReportListHTML('Personal de Planta', 'blue', pPlanta, aPlanta);
            }
            
            // UI de Extras
            if (pExtra.length > 0 || aExtra.length > 0) {
                container.innerHTML += buildReportListHTML('Personal Extra (Eventual)', 'orange', pExtra, aExtra);
            }
        }

        function buildReportListHTML(title, color, presentes, ausentes) {
            let html = `
            <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm mt-2">
                <div class="bg-${color}-50 p-3 border-b border-slate-200 text-center">
                    <h4 class="text-sm font-black text-${color}-800 uppercase tracking-wide">${title}</h4>
                </div>
                <div class="p-2 flex flex-col">`;
            
            ausentes.forEach(emp => {
                html += `<div class="text-sm font-bold text-slate-700 py-2 px-2 border-b border-slate-100 flex items-center justify-between last:border-0">
                    <div class="truncate"><span class="text-red-500 mr-2">✗</span>${emp.nombre} ${emp.apellido}</div>
                    <span class="text-[10px] text-red-500 font-bold bg-red-50 px-2 py-1 rounded">AUSENTE</span>
                </div>`;
            });

            presentes.forEach(emp => {
                html += `<div class="text-sm font-medium text-slate-600 py-2 px-2 border-b border-slate-100 flex items-center justify-between last:border-0">
                    <div class="truncate"><span class="text-green-500 mr-2">✓</span>${emp.nombre} ${emp.apellido}</div>
                    <span class="text-[10px] text-green-600 font-bold bg-green-50 px-2 py-1 rounded">PRESENTE</span>
                </div>`;
            });
            
            html += `</div></div>`;
            return html;
        }

        // ==========================================
        // PDF PROFESIONAL LÓGICA (Blanco y Negro / Formal)
        // ==========================================
        function generateProfessionalPDF() {
            const date = document.getElementById('report-date').value;
            const attOfDay = state.attendance[date];
            if(!attOfDay) return;

            const btnPdf = document.getElementById('btn-download-pdf');
            const originalText = btnPdf.innerHTML;
            btnPdf.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-2xl"></i> GENERANDO...`;
            btnPdf.disabled = true;

            const pPlanta = [], aPlanta = [], pExtra = [], aExtra = [];
            state.employees.forEach(emp => {
                const isPlanta = emp.contrato === 'planta';
                const status = attOfDay[emp.id];
                if(status === 'presente') isPlanta ? pPlanta.push(emp) : pExtra.push(emp);
                if(status === 'ausente') isPlanta ? aPlanta.push(emp) : aExtra.push(emp);
            });

            // CREAMOS UN CONTENEDOR INVISIBLE SOLO PARA EL PDF
            const pdfContainer = document.createElement('div');
            pdfContainer.style.padding = '40px';
            pdfContainer.style.fontFamily = 'Helvetica, Arial, sans-serif';
            pdfContainer.style.color = '#000'; // Todo negro
            pdfContainer.style.backgroundColor = '#fff';
            pdfContainer.style.width = '800px'; // Fijo para asegurar proporción en PDF
            
            // CABECERA FORMAL
            let pdfHTML = `
                <div style="border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; text-align: center;">
                    <h1 style="margin: 0; font-size: 24px; text-transform: uppercase;">Logística Villaverde</h1>
                    <h2 style="margin: 5px 0 0 0; font-size: 18px; color: #444;">Reporte Diario de Asistencia</h2>
                    <p style="margin: 5px 0 0 0; font-size: 14px;"><strong>Fecha:</strong> ${formatDateDisplay(date)}</p>
                </div>
            `;

            // FUNCIÓN PARA CREAR TABLAS FORMALES
            const buildTable = (title, presArr, ausArr) => {
                if(presArr.length === 0 && ausArr.length === 0) return '';
                
                let tableHTML = `
                    <h3 style="margin: 20px 0 10px 0; font-size: 16px; background-color: #f0f0f0; padding: 5px 10px; border: 1px solid #ccc;">${title}</h3>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px;">
                        <thead>
                            <tr>
                                <th style="border: 1px solid #000; padding: 8px; text-align: left; background-color: #f9f9f9;">Empleado / Nombre Completo</th>
                                <th style="border: 1px solid #000; padding: 8px; text-align: center; width: 150px; background-color: #f9f9f9;">Estado</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                // Primero los ausentes (destacados)
                ausArr.forEach(emp => {
                    tableHTML += `
                        <tr>
                            <td style="border: 1px solid #000; padding: 8px;">${emp.nombre} ${emp.apellido}</td>
                            <td style="border: 1px solid #000; padding: 8px; text-align: center; font-weight: bold; color: #d32f2f;">AUSENTE</td>
                        </tr>
                    `;
                });

                // Luego los presentes
                presArr.forEach(emp => {
                    tableHTML += `
                        <tr>
                            <td style="border: 1px solid #000; padding: 8px;">${emp.nombre} ${emp.apellido}</td>
                            <td style="border: 1px solid #000; padding: 8px; text-align: center; color: #388e3c;">PRESENTE</td>
                        </tr>
                    `;
                });

                tableHTML += `</tbody></table>`;
                return tableHTML;
            };

            pdfHTML += buildTable('PERSONAL DE PLANTA', pPlanta, aPlanta);
            pdfHTML += buildTable('PERSONAL EVENTUAL (EXTRAS)', pExtra, aExtra);
            
            pdfHTML += `
                <div style="margin-top: 50px; text-align: center; font-size: 12px; color: #666;">
                    <p>_____________________________________</p>
                    <p>Firma / Sello de Conformidad</p>
                    <p style="margin-top:20px;">Documento generado automáticamente por el Sistema de Logística Villaverde</p>
                </div>
            `;

            pdfContainer.innerHTML = pdfHTML;
            document.body.appendChild(pdfContainer); // Lo agregamos temporalmente al DOM

            const opt = {
                margin:       10,
                filename:     `Asistencia_Villaverde_${date}.pdf`,
                image:        { type: 'jpeg', quality: 1 },
                html2canvas:  { scale: 2, useCORS: true, logging: false },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            setTimeout(() => {
                html2pdf().set(opt).from(pdfContainer).save().then(() => {
                    btnPdf.innerHTML = originalText;
                    btnPdf.disabled = false;
                    document.body.removeChild(pdfContainer); // Limpiamos el DOM
                }).catch(err => {
                    console.error("Error al generar PDF:", err);
                    alert("Ocurrió un error.");
                    btnPdf.innerHTML = originalText;
                    btnPdf.disabled = false;
                    document.body.removeChild(pdfContainer);
                });
            }, 300);
        }
    </script>
</body>
</html>
